name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: terrana
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: terrana
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: terrana
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../terrana-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: terrana-${{ matrix.target }}
          path: terrana-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # crates.io publishes the version in Cargo.toml, not the tag — so guard that
      # they agree before publishing (versions are immutable and can't be re-pushed).
      - name: Verify Cargo.toml version matches the tag
        run: |
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml=$CARGO_VERSION  tag=$TAG"
          test "$CARGO_VERSION" = "$TAG" || {
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag $GITHUB_REF_NAME"; exit 1;
          }
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
