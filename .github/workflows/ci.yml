name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Includes the #[ignore]d integration tests, which start the server and need
      # network access to fetch the DuckDB spatial extension on first run.
      - run: cargo test --all -- --include-ignored

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: terrana-${{ matrix.os }}
          path: target/release/terrana

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    # The cold run compiles bundled DuckDB for the python crate (~15–20 min); the
    # cache below makes subsequent runs fast. 40 min is a safe backstop, not a target.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Cache python/target so DuckDB is compiled once, not on every run.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: python
      - uses: astral-sh/setup-uv@v5
      # Single shell so the activated venv persists across build + test. Needs
      # network (DuckDB fetches its `spatial` extension on first use — CI has it).
      - name: Build extension and run tests
        working-directory: python
        run: |
          uv venv --python 3.13
          source .venv/bin/activate
          uv pip install maturin pytest pytest-timeout
          maturin develop
          # --timeout caps any single test so a stuck server test can't hang the job.
          pytest tests/ -v --timeout=120
